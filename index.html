<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MIMIC — life, arranged by a machine's eye</title>
<meta name="description" content="A live atlas of life on Earth, arranged by how it looks to a machine rather than by what it is — and, where the planet's feed outruns the eye, filled with the forms the machine expects but no one has seen." />
<style>
  :root {
    color-scheme: dark;
    --ink:    #f0f5f1;
    --ink-2:  #c3d0c7;
    --green:  #8fe6a6;
    --violet: #c4a6f0;
    --edge:   rgba(255,255,255,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05070a; }
  body {
    font-family: "SF Mono", ui-monospace, "Menlo", monospace;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    cursor: grab;
  }
  body.dragging { cursor: grabbing; }
  body.pickable { cursor: pointer; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  #app.fallback {
    display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: clamp(12px, 2vw, 28px);
    align-content: center; padding: clamp(72px, 10vw, 140px) clamp(24px, 10vw, 180px);
    background: radial-gradient(85% 80% at 50% 45%, #101b18 0%, #05070a 72%);
  }
  .fallback-form { min-width: 0; color: var(--ink-2); text-align: center; font-size: 10px; line-height: 1.35; }
  .fallback-form img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 50%; display: block; border: 1px solid rgba(185,224,196,0.22); }
  .fallback-form figcaption { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 8px; }

  /* a soft vignette frames the field without a single line of text */
  #vignette {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: radial-gradient(130% 100% at 50% 46%, transparent 56%, rgba(5,7,10,0.6) 100%);
  }

  .hud { position: fixed; z-index: 10; pointer-events: none; user-select: none; }
  .hud.tl { top: max(30px, env(safe-area-inset-top)); left: 32px; }
  .hud.caption { top: max(30px, env(safe-area-inset-top)); right: 32px; text-align: right; max-width: calc(100vw - 190px); }
  .hud.pulse { top: max(56px, calc(env(safe-area-inset-top) + 26px)); left: 32px; color: rgba(195,208,199,0.66); font-size: 10px; letter-spacing: 0.11em; text-transform: uppercase; }

  .wordmark {
    font-size: 15px; letter-spacing: 0.64em; font-weight: 600;
    color: var(--ink); text-transform: uppercase; text-indent: 0.64em;
  }
  .tagline {
    font-size: 9.5px; line-height: 1; white-space: nowrap;
    color: var(--ink-2); letter-spacing: 0.04em; font-weight: 400;
    text-transform: uppercase; opacity: 0.82;
  }

  /* minimal legend — two marks, two words, the whole vocabulary */
  .legend {
    bottom: max(28px, env(safe-area-inset-bottom)); left: 32px;
    display: flex; gap: 22px; align-items: center;
  }
  .legend .lg { display: flex; align-items: center; gap: 9px;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2); }
  .legend .mk { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
  .legend .mk.real  { background: radial-gradient(circle at 38% 34%, #d9efdd, #5fae74); }
  .legend .mk.ghost { background: transparent; border: 2px solid var(--violet); box-shadow: 0 0 10px rgba(196,166,240,0.55); }

  /* sound toggle — tiny, lower right */
  #sound {
    position: fixed; z-index: 11; bottom: max(26px, env(safe-area-inset-bottom)); right: 30px;
    pointer-events: auto; cursor: pointer; border: 0; background: none;
    font-family: inherit; color: var(--ink-2); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; display: flex; align-items: center; gap: 9px;
    opacity: 0.78; transition: opacity .2s ease;
  }
  #sound:hover { opacity: 1; }
  #sound .ico { width: 9px; height: 9px; border-radius: 50%; background: var(--ink-2); transition: all .25s ease; }
  #sound.on .ico { background: var(--green); box-shadow: 0 0 11px rgba(143,230,166,0.8); }
  #motion {
    position: fixed; z-index: 11; bottom: max(26px, env(safe-area-inset-bottom)); right: 142px;
    pointer-events: auto; cursor: pointer; border: 0; background: none;
    font-family: inherit; color: var(--ink-2); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0.78; transition: opacity .2s ease;
  }
  #motion:hover { opacity: 1; }
  #recenter {
    position: fixed; z-index: 11; bottom: max(26px, env(safe-area-inset-bottom)); right: 270px;
    pointer-events: auto; cursor: pointer; border: 0; background: none;
    font-family: inherit; color: var(--ink-2); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0.78; transition: opacity .2s ease;
  }
  #recenter:hover { opacity: 1; }
  #guide {
    position: fixed; z-index: 13; left: 50%; bottom: max(74px, env(safe-area-inset-bottom));
    transform: translate(-50%, 10px); opacity: 0; pointer-events: none;
    padding: 9px 13px; border: 1px solid rgba(180,200,188,0.18); border-radius: 999px;
    background: rgba(7,11,14,0.72); backdrop-filter: blur(12px); color: var(--ink-2);
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
    transition: opacity .45s ease, transform .45s ease;
  }
  #guide.show { opacity: 1; transform: translate(-50%, 0); }

  /* hover readout — quiet, follows the cursor */
  #readout {
    position: fixed; z-index: 12; pointer-events: none;
    padding: 12px 16px; max-width: 320px;
    background: rgba(7,11,14,0.82); backdrop-filter: blur(13px);
    border: 1px solid rgba(180,200,188,0.2); border-radius: 9px;
    line-height: 1.5;
    opacity: 0; transition: opacity .16s ease; transform: translate(-50%, 18px);
    box-shadow: 0 14px 44px rgba(0,0,0,0.5);
  }
  #readout .name { color: var(--ink); font-style: italic; font-size: 16px; }
  #readout .common { color: var(--ink-2); font-style: normal; }
  #readout .meta { color: var(--ink-2); margin-top: 6px; font-size: 12.5px; opacity: 0.9; }
  #readout.imagined { border-color: rgba(196,166,240,0.34); }
  #readout.imagined .name { color: var(--violet); font-style: normal; letter-spacing: 0.05em; text-transform: uppercase; font-size: 12.5px; }
  #readout.imagined .meta i { color: var(--ink); font-style: italic; }

  /* click-to-enlarge detail card — the real photograph, brought close */
  #detail {
    position: fixed; z-index: 14; top: 50%; right: 40px; transform: translateY(-50%) translateX(24px);
    width: min(330px, calc(100vw - 64px));
    background: rgba(6,10,12,0.86); backdrop-filter: blur(16px);
    border: 1px solid rgba(190,210,198,0.18); border-radius: 14px; overflow: hidden;
    box-shadow: 0 26px 80px rgba(0,0,0,0.55);
    opacity: 0; pointer-events: none; transition: opacity .4s ease, transform .4s cubic-bezier(.2,.7,.2,1);
  }
  #detail.show { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
  #detail .photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #0a0f12; }
  #detail .body { padding: 16px 18px 18px; }
  #detail .sci { font-size: 18px; font-style: italic; color: var(--ink); line-height: 1.3; }
  #detail .common { font-style: normal; color: var(--ink-2); font-size: 13px; display: block; margin-top: 4px; }
  #detail .row { margin-top: 12px; font-size: 12.5px; line-height: 1.55; color: var(--ink-2); }
  #detail .row b { color: var(--ink); font-weight: 600; }
  #detail .place { margin-top: 8px; font-size: 12px; color: rgba(195,208,199,0.72); }
  #detail .source { display: inline-block; margin-top: 11px; color: var(--green); font-size: 11px; letter-spacing: 0.06em; text-decoration: none; }
  #detail .source:hover { text-decoration: underline; }
  #detail.imagined { border-color: rgba(196,166,240,0.4); }
  #detail .ghostmark {
    height: 150px; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 45%, rgba(196,166,240,0.22), transparent 70%);
  }
  #detail .ghostmark span { width: 78px; height: 78px; border-radius: 50%;
    border: 2px solid var(--violet); box-shadow: 0 0 28px rgba(196,166,240,0.6), inset 0 0 22px rgba(196,166,240,0.25); }
  #detail .listen { margin-top: 12px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--green); display: none; align-items: center; gap: 8px; }
  #detail .listen.on { display: flex; }
  #detail .listen i { width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 9px var(--green); animation: listenpulse 1.4s ease-in-out infinite; }
  @keyframes listenpulse { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.2); } }
  #detail .close { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(195,208,199,0.6); margin-top: 12px; }

  @media (max-width: 760px) {
    .hud.tl { left: 20px; }
    .hud.pulse { left: 20px; }
    .hud.caption { right: 20px; }
    .tagline { font-size: 9.5px; letter-spacing: 0.04em; }
    .legend { left: 20px; gap: 16px; }
    #detail { right: 50%; transform: translate(50%, calc(-50% + 24px)); top: 46%; }
    #detail.show { transform: translate(50%, -50%); }
    #app.fallback { grid-template-columns: repeat(3, minmax(0, 1fr)); padding: 80px 28px; }
    #motion { right: 132px; }
    #recenter { right: 245px; }
    #guide { max-width: calc(100vw - 36px); overflow: hidden; text-overflow: ellipsis; }
  }

  /* intro — one confident frame; the click that enters also wakes the sound */
  #intro {
    position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px; text-align: center; padding: 24px;
    background: radial-gradient(120% 120% at 50% 42%, #0a1014 0%, #05070a 72%);
    transition: opacity 1.2s ease; cursor: pointer;
  }
  #intro.gone { opacity: 0; pointer-events: none; }
  #intro .it { font-size: 19px; letter-spacing: 0.66em; color: var(--ink); font-weight: 600; text-indent: 0.66em; }
  #intro .is { font-size: 15px; color: var(--ink-2); max-width: 40ch; line-height: 1.75; letter-spacing: 0.02em; }
  #intro .bar { width: 200px; height: 1px; background: rgba(150,170,160,0.16); overflow: hidden; }
  #intro .bar i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--violet)); transition: width .45s ease; }
  #intro .enter { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-2);
    opacity: 0; transition: opacity .8s ease; }
  #intro.ready .enter { opacity: 0.85; }
  #intro.ready .bar { display: none; }
  #intro .status { min-height: 1.4em; color: rgba(195,208,199,0.76); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  #intro .retry { border: 1px solid rgba(195,208,199,0.4); border-radius: 999px; padding: 9px 14px; background: transparent; color: var(--ink); cursor: pointer; font: inherit; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  #intro .err { color: #e6a6a6; font-size: 12px; max-width: 46ch; line-height: 1.6; }
</style>
</head>
<body>
  <div id="app" role="application" aria-label="MIMIC, an interactive field of animal observations. Use arrow keys to browse and Escape to return to the full field."></div>
  <div id="vignette"></div>

  <div class="hud tl">
    <div class="wordmark">Mimic</div>
  </div>
  <div class="hud pulse" id="pulse">waiting for observations</div>
  <div class="hud caption">
    <div class="tagline">Life sorted by sight, not by name.</div>
  </div>

  <div class="hud legend">
    <span class="lg"><i class="mk real"></i>observed</span>
    <span class="lg"><i class="mk ghost"></i>imagined</span>
  </div>

  <button id="sound" aria-label="toggle sound" aria-pressed="false"><span class="ico"></span><span class="lbl">sound</span></button>
  <button id="motion" aria-label="toggle motion" aria-pressed="true"><span class="lbl">motion on</span></button>
  <button id="recenter" aria-label="recenter the field">recenter</button>

  <div id="readout"></div>
  <div id="detail"></div>
  <div id="guide">drag to orbit · click an animal to listen · arrows to browse</div>

  <div id="intro">
    <div class="it">Mimic</div>
    <div class="is">Watching what the planet sees, and imagining the life it has not.</div>
    <div class="bar"><i id="intro-bar"></i></div>
    <div class="status" id="intro-status" aria-live="polite">preparing the field</div>
    <div class="enter">click to enter</div>
    <div class="err" id="intro-err"></div>
    <button class="retry" id="retry" hidden>try again</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
      "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
      "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./src/main.js?v=20260712"></script>
</body>
</html>
